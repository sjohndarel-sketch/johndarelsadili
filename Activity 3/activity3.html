<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 3 - Character Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2 style="color: yellow; text-align: center; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 50px;">
    Aquatic Specimens
</h2>

    <div class="aquatic-gallery">
    <!-- Card 1 -->
    <div class="fish-card">
        <div class="fish-image">
            <img src="images/ct.jpg" alt="Midnight Betta">
        </div>
        <div class="fish-info">
            <span class="tag">SPECIMEN 1</span>
            <h3>CROWNTAIL BETTA</h3>
        </div>
    </div>

    <!-- Card 2 -->
    <div class="fish-card">
        <div class="fish-image">
            <img src="images/jelly.jpg" alt="Glowing Jellyfish">
        </div>
        <div class="fish-info">
            <span class="tag">SPECIMEN 2</span>
            <h3>MOON JELLY</h3>
        </div>
    </div>

    <!-- Card 3 -->
    <div class="fish-card">
        <div class="fish-image">
            <img src="images/angler.jpg" alt="Anglerfish">
        </div>
        <div class="fish-info">
            <span class="tag">SPECIMEN 3</span>
            <h3>ABYSSAL ANGLER</h3>
        </div>
    </div>
    
</div>

<div class="aquatic-gallery2">
    <!-- Card 1 -->
    <div class="fish-card">
        <div class="fish-image">
            <img src="images/lionfish.jpg" alt="Midnight Betta">
        </div>
        <div class="fish-info">
            <span class="tag">SPECIMEN 4</span>
            <h3>LIONFISH</h3>
        </div>
    </div>

    <!-- Card 2 -->
    <div class="fish-card">
        <div class="fish-image">
            <img src="images/yellowtang.jpg" alt="Glowing Jellyfish">
        </div>
        <div class="fish-info">
            <span class="tag">SPECIMEN 5</span>
            <h3>YELLOW TANG</h3>
        </div>
    </div>

    <!-- Card 3 -->
    <div class="fish-card">
        <div class="fish-image">
            <img src="images/red.jpg" alt="Anglerfish">
        </div>
        <div class="fish-info">
            <span class="tag">SPECIMEN 6</span>
            <h3>RED AROWANA</h3>
        </div>
    </div>
    
</div>


</body>
</html>
